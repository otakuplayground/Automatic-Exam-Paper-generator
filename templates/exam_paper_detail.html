<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ paper.title }}</title>
</head>
<body>
    <div class="container mt-5">
        <h2>{{ paper.title }}</h2>
        <p><strong>Created At:</strong> {{ paper.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</p>
        <pre>{{ paper.content }}</pre>
        <a href="{{ url_for('view_exam_papers') }}" class="btn btn-secondary">Back to Papers</a>
    </div>
</body>
</html>
