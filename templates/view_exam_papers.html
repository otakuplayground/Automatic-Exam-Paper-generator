<!DOCTYPE html>
<html lang="en">
<head>
    <title>Generated Exam Papers</title>
</head>
<body>
    <div class="container mt-5">
        <h2>Generated Exam Papers</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Date Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for paper in papers %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ paper.title }}</td>
                    <td>{{ paper.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                    <td>
                        <a href="{{ url_for('exam_paper_detail', paper_id=paper.id) }}" class="btn btn-sm btn-primary">View</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
